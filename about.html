<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About CSS</title>

    <style>
      .example {
        background-color: blue;
        width: 200px;
        height: 100px;
        padding: 25px 50px 65px 30px; /* padding order is Top Right Bottom Left*/
        color: white;
      }
      .example-1 {
        background-color: green;
        width: 200px;
        height: 100px;
        padding: 25px;
        color: white;
        margin: 10px; /* Add a space from all the sides, can use margin-top,margin-left, margin-bottom,margin-right to specify which side you want margin to add onto*/
      }
      .example-2 {
        background-color: red;
        width: 200px;
        height: 100px;
        padding: 25px;
        color: white;
        border: 2.5px solid black; /* Adds a border to the container, can use border-top,border-bottom etc to specify the location*/
      }

      #main-example {
        background-color: blueviolet;
        text-align: center;
      }
    </style>
  </head>
  <body style="margin-left: 20px; margin-right: 20px;">
    <a href="index.html">Home</a>
    <a href="position.html">Positon</a>
    <!--Since Id is unique ID is used for  main containers and Classes used for sub containers-->
    <div id="main-example">
      <div class="example">
        <h1>Blue</h1>
        <p>This is a blue container</p>
      </div>

      <div class="example-1">
        <h1>Green</h1>
        <p>This is a green container</p>
      </div>

      <div class="example-2">
        <h1>Red</h1>
        <p>This is a red container</p>
      </div>
    </div>
  </body>
</html>
