<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About CSS</title>

    <style>
      .example {
        background-color: blue;
        width: 200px;
        height: 100px;
        padding: 25px;
        color: white;
      }
      .example-1 {
        background-color: green;
        width: 200px;
        height: 100px;
        padding: 25px;
        color: white;
      }
      .example-2 {
        background-color: red;
        width: 200px;
        height: 100px;
        padding: 25px;
        color: white;
      }

      #main-example {
        background-color: blueviolet;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <a href="index.html">Home</a>
    <!--Since Id is unique ID is used for  main containers and Classes used for sub containers-->
    <div id="main-example">
      <div class="example">
        <h1>Blue</h1>
        <p>This is a blue container</p>
      </div>

      <div class="example-1">
        <h1>Green</h1>
        <p>This is a green container</p>
      </div>

      <div class="example-2">
        <h1>Red</h1>
        <p>This is a red container</p>
      </div>
    </div>
  </body>
</html>
