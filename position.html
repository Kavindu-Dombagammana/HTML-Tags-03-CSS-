<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>position CSS</title>

    <style>
      .example {
        background-color: blue;
        width: 200px;
        height: 100px;
        padding: 25px;
        color: white;
        /* position: relative; Relative positioning takes the location of the same positoning */
        position: absolute; /*This takes the positoning of the top and left of the web page*/
      }
      .example-1 {
        background-color: green;
        width: 200px;
        height: 100px;
        padding: 25px;
        color: white;
        position: absolute;
        left: 275px;
      }
      .example-2 {
        background-color: red;
        width: 200px;
        height: 100px;
        padding: 25px;
        color: white;
        position: absolute;
        left: 550px;
      }
      .example-3 {
        background-color: yellow;
        width: 200px;
        height: 100px;
        padding: 25px;
        color: white;
        position: absolute;
        left: 825px;
      }
      .example-4 {
        background-color: pink;
        width: 200px;
        height: 100px;
        padding: 25px;
        color: white;
        position: absolute;
        left: 1100px;
      }
    </style>
  </head>

  <body>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <div class="example">
      <h1>Blue</h1>
      <p>This is a blue container</p>
    </div>

    <div class="example-1">
      <h1>Green</h1>
      <p>This is a green container</p>
    </div>

    <div class="example-2">
      <h1>Red</h1>
      <p>This is a red container</p>
    </div>

    <div class="example-3">
      <h1>yellow</h1>
      <p>This is a yellow container</p>
    </div>

    <div class="example-4">
      <h1>pink</h1>
      <p>This is a pink container</p>
    </div>
  </body>
</html>
